<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneStopAgent — Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #0078D4;
    --blue-dark: #106EBE;
    --blue-light: #DEECF9;
    --grey-bg: #FAF9F8;
    --grey-border: #E1DFDD;
    --grey-text: #605E5C;
    --grey-muted: #A19F9D;
    --dark: #323130;
    --green: #107C10;
    --green-light: #DFF6DD;
    --red: #A4262C;
    --red-light: #FDE7E9;
    --sidebar-w: 260px;
    --topbar-h: 48px;
  }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
    background: var(--grey-bg);
    color: var(--dark);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Top Bar ── */
  .topbar {
    height: var(--topbar-h);
    background: var(--blue);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  .topbar .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
  }
  .topbar .brand .icon {
    width: 26px; height: 26px;
    background: rgba(255,255,255,.2);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }
  .topbar .back-btn {
    background: none; border: none; color: #fff;
    font-size: 18px; cursor: pointer;
    padding: 4px 8px; border-radius: 4px;
    display: flex; align-items: center;
    text-decoration: none;
  }
  .topbar .back-btn:hover { background: rgba(255,255,255,.15); }
  .topbar .context-label { font-size: 14px; font-weight: 500; opacity: .9; flex: 1; }
  .topbar .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: #005A9E; border: 2px solid rgba(255,255,255,.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    background: #fff;
    border-right: 1px solid var(--grey-border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar-header {
    padding: 16px 20px 8px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--grey-muted);
  }
  .agent-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }
  .agent-row:hover { background: #F3F2F1; }
  .agent-row.active-agent { background: #EFF6FC; }
  .agent-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    position: relative;
  }
  .agent-name { font-size: 13px; font-weight: 500; flex: 1; }
  .agent-name.inactive { color: var(--grey-muted); text-decoration: line-through; }
  .status-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-idle { background: #C8C6C4; }
  .dot-working { background: var(--blue); animation: pulse 1.4s ease-in-out infinite; }
  .dot-error { background: var(--red); }
  .dot-complete { background: var(--green); }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .4; transform: scale(1.4); }
  }

  /* Toggle */
  .toggle-wrap { position: relative; }
  .toggle {
    width: 36px; height: 20px;
    border-radius: 10px;
    background: #C8C6C4;
    border: none;
    cursor: pointer;
    position: relative;
    transition: background .2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    transition: transform .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .toggle.on { background: var(--blue); }
  .toggle.on::after { transform: translateX(16px); }
  .toggle:disabled { opacity: .4; cursor: not-allowed; }
  .toggle:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

  /* Tooltip */
  .tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    right: 0;
    background: var(--dark);
    color: #fff;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 50;
    margin-bottom: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    right: 12px;
    border: 5px solid transparent;
    border-top-color: var(--dark);
  }
  .toggle-wrap:hover .tooltip,
  .toggle:focus .tooltip { display: block; }

  /* Pipeline progress */
  .pipeline-progress {
    margin: 16px 20px;
    padding: 12px 14px;
    background: #F3F2F1;
    border-radius: 6px;
    font-size: 12px;
    color: var(--grey-text);
  }
  .pipeline-progress .step {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
  }
  .pipeline-progress .step-icon {
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    flex-shrink: 0;
  }
  .step-done { background: var(--green); color: #fff; }
  .step-active { background: var(--blue); color: #fff; animation: pulse 1.4s ease-in-out infinite; }
  .step-pending { background: #E1DFDD; color: #A19F9D; }

  /* ── Main Chat ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .chat-thread {
    flex: 1;
    overflow-y: auto;
    padding: 20px 32px 20px;
    scroll-behavior: smooth;
  }
  .message {
    margin-bottom: 20px;
    max-width: 720px;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-user {
    margin-left: auto;
  }
  .msg-user .bubble {
    background: var(--blue);
    color: #fff;
    padding: 12px 16px;
    border-radius: 12px 12px 4px 12px;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg-user .msg-meta {
    text-align: right;
    font-size: 11px;
    color: var(--grey-muted);
    margin-top: 4px;
  }
  .msg-agent .agent-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .msg-agent .agent-header .mini-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .msg-agent .agent-header .name {
    font-size: 13px;
    font-weight: 600;
    color: var(--dark);
  }
  .msg-agent .bubble {
    background: #fff;
    border: 1px solid var(--grey-border);
    padding: 16px 20px;
    border-radius: 4px 12px 12px 12px;
    font-size: 14px;
    line-height: 1.6;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .msg-agent .msg-meta {
    font-size: 11px;
    color: var(--grey-muted);
    margin-top: 4px;
  }

  /* ── Rich content ── */
  .checklist { list-style: none; margin: 12px 0; }
  .checklist li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    transition: background .15s;
    cursor: pointer;
  }
  .checklist li:hover { background: #F3F2F1; }
  .checklist li input[type="checkbox"] {
    width: 18px; height: 18px;
    margin-top: 2px;
    accent-color: var(--blue);
    cursor: pointer;
    flex-shrink: 0;
  }
  .checklist li .item-content { flex: 1; }
  .checklist li .item-title { font-weight: 600; font-size: 14px; }
  .checklist li .item-desc { font-size: 13px; color: var(--grey-text); margin-top: 2px; }

  .btn-proceed {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 20px;
    height: 36px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    margin-top: 8px;
  }
  .btn-proceed:hover { background: var(--blue-dark); }
  .btn-proceed:disabled { background: #C8C6C4; cursor: default; }
  .btn-proceed:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  .btn-proceed .count-badge {
    background: rgba(255,255,255,.25);
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 12px;
  }

  .btn-approve {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 20px;
    height: 36px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    margin-top: 12px;
  }
  .btn-approve:hover { background: #0B6A0B; }
  .btn-approve.clicked { background: #C8C6C4; cursor: default; pointer-events: none; }

  /* Architecture diagram placeholder */
  .arch-diagram {
    background: #F3F2F1;
    border: 1px solid var(--grey-border);
    border-radius: 8px;
    padding: 24px;
    margin: 12px 0;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .arch-diagram svg { max-width: 100%; }

  /* Tables */
  .cost-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }
  .cost-table th {
    background: #F3F2F1;
    padding: 8px 12px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid var(--grey-border);
    position: sticky;
    top: 0;
  }
  .cost-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #F3F2F1;
  }
  .cost-table tr:nth-child(even) td { background: #FAFAFA; }
  .cost-table .total-row td {
    font-weight: 700;
    border-top: 2px solid var(--grey-border);
    background: #F3F2F1;
  }
  .cost-footnote {
    font-size: 11px;
    color: var(--grey-muted);
    margin-top: 8px;
    font-style: italic;
  }

  /* Key components list */
  .component-list { margin: 12px 0; }
  .component-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #F3F2F1;
  }
  .component-item:last-child { border-bottom: none; }
  .comp-icon {
    width: 32px; height: 32px;
    background: var(--blue-light);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    color: var(--blue);
  }
  .comp-name { font-weight: 600; font-size: 13px; }
  .comp-desc { font-size: 12px; color: var(--grey-text); }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    color: var(--grey-text);
    font-size: 13px;
    font-style: italic;
  }
  .thinking-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--blue);
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce .6s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: .15s; }
  .thinking-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* ── Input bar ── */
  .input-bar {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 32px 16px;
    background: #fff;
    border-top: 1px solid var(--grey-border);
    flex-shrink: 0;
  }
  .input-bar textarea {
    flex: 1;
    min-height: 40px;
    max-height: 120px;
    border: 1px solid #C8C6C4;
    border-radius: 8px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 14px;
    resize: none;
    line-height: 1.4;
    transition: border-color .2s;
  }
  .input-bar textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }
  .send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--blue);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--blue-dark); }
  .send-btn:disabled { background: #C8C6C4; cursor: default; }
  .send-btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  .send-btn svg { width: 18px; height: 18px; }

  /* Scroll indicator */
  .scroll-pill {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--blue);
    color: #fff;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    display: none;
    z-index: 5;
    animation: fadeIn .2s ease;
  }

  /* section labels in sidebar */
  .sidebar-section-label {
    padding: 12px 20px 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--grey-muted);
  }

  /* confirmation modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 8px;
    padding: 24px 28px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  .modal h3 { font-size: 16px; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: var(--grey-text); line-height: 1.5; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button {
    padding: 0 16px; height: 32px;
    border-radius: 4px; border: none;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .modal-cancel { background: #F3F2F1; color: var(--dark); }
  .modal-confirm { background: var(--red); color: #fff; }
</style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <a class="back-btn" href="landing.html" aria-label="Back to projects">←</a>
    <div class="brand">
      <div class="icon">OS</div>
      <span>OneStopAgent</span>
    </div>
    <span class="context-label" id="contextLabel">E-Commerce Platform — Contoso Ltd</span>
    <div class="avatar" title="Alex Johnson">AJ</div>
  </div>

  <!-- Layout -->
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" role="navigation" aria-label="Agent panel">
      <div class="sidebar-header">Agents</div>
      <div class="sidebar-section-label">Active</div>
      <div id="agentList"></div>

      <!-- Pipeline progress -->
      <div class="pipeline-progress">
        <div style="font-weight:600;margin-bottom:6px;">Pipeline</div>
        <div class="step"><span class="step-icon step-done">✓</span> Envisioning</div>
        <div class="step"><span class="step-icon step-done">✓</span> Architecture</div>
        <div class="step"><span class="step-icon step-active">●</span> Cost Estimation</div>
        <div class="step"><span class="step-icon step-pending">○</span> Business Value</div>
        <div class="step"><span class="step-icon step-pending">○</span> Presentation</div>
      </div>
    </aside>

    <!-- Chat -->
    <main class="chat-area" role="main" aria-label="Chat thread">
      <div class="chat-thread" id="chatThread"></div>
      <div class="scroll-pill" id="scrollPill" onclick="scrollToBottom()">↓ New messages</div>
      <div class="input-bar">
        <textarea id="msgInput" placeholder="Type your message…" rows="1" aria-label="Message input"></textarea>
        <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
        </button>
      </div>
    </main>
  </div>

  <!-- Confirmation modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal" role="dialog" aria-labelledby="modalTitle">
      <h3 id="modalTitle">⚠️ Deactivate Agent?</h3>
      <p id="modalBody">This agent is currently working. Deactivating it will cancel the in-progress task. Are you sure?</p>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-confirm" onclick="confirmDeactivate()">Confirm</button>
      </div>
    </div>
  </div>

<script>
// ── Agent data ──
const agents = [
  { id: 'envisioning', abbr: 'EN', name: 'Envisioning', color: '#8764B8', status: 'idle', active: true, canDeactivate: true },
  { id: 'architect', abbr: 'SA', name: 'System Architect', color: '#038387', status: 'idle', active: true, canDeactivate: false, reason: 'Required agent — cannot be deactivated' },
  { id: 'azure', abbr: 'AE', name: 'Azure Expert', color: '#0078D4', status: 'idle', active: true, canDeactivate: true },
  { id: 'cost', abbr: 'CS', name: 'Cost Specialist', color: '#CA5010', status: 'working', active: true, canDeactivate: true },
  { id: 'value', abbr: 'BV', name: 'Business Value', color: '#498205', status: 'idle', active: true, canDeactivate: true },
  { id: 'presentation', abbr: 'PR', name: 'Presentation', color: '#8E562E', status: 'idle', active: true, canDeactivate: true }
];

let pendingDeactivate = null;

function renderAgents() {
  const list = document.getElementById('agentList');
  list.innerHTML = agents.map(a => {
    const dotClass = a.active ? `dot-${a.status}` : 'dot-idle';
    const nameClass = a.active ? '' : 'inactive';
    const toggleClass = a.active ? 'toggle on' : 'toggle';
    const disabled = !a.canDeactivate ? 'disabled' : '';
    return `
      <div class="agent-row ${a.status === 'working' ? 'active-agent' : ''}" data-id="${a.id}">
        <div class="agent-avatar" style="background:${a.active ? a.color : '#C8C6C4'};">${a.abbr}</div>
        <span class="agent-name ${nameClass}">${a.name}</span>
        <span class="status-dot ${dotClass}"></span>
        <div class="toggle-wrap">
          <button class="${toggleClass}" ${disabled} onclick="toggleAgent('${a.id}')" aria-label="Toggle ${a.name}" role="switch" aria-checked="${a.active}"></button>
          ${!a.canDeactivate ? `<div class="tooltip">${a.reason}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function toggleAgent(id) {
  const agent = agents.find(a => a.id === id);
  if (!agent || !agent.canDeactivate) return;
  if (agent.active && agent.status === 'working') {
    pendingDeactivate = id;
    document.getElementById('modal').classList.add('show');
    document.getElementById('modalBody').textContent =
      `${agent.name} is currently working. Deactivating it will cancel the in-progress task. Are you sure?`;
    return;
  }
  agent.active = !agent.active;
  if (!agent.active) agent.status = 'idle';
  renderAgents();
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  pendingDeactivate = null;
}

function confirmDeactivate() {
  if (pendingDeactivate) {
    const agent = agents.find(a => a.id === pendingDeactivate);
    if (agent) { agent.active = false; agent.status = 'idle'; }
  }
  closeModal();
  renderAgents();
}

// ── Chat messages ──
const chatThread = document.getElementById('chatThread');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

const agentColors = { pm: '#4A4A4A', envisioning: '#8764B8', architect: '#038387', azure: '#0078D4', cost: '#CA5010', value: '#498205', presentation: '#8E562E' };
const agentNames = { pm: 'Project Manager', envisioning: 'Envisioning Agent', architect: 'System Architect', azure: 'Azure Expert', cost: 'Cost Specialist', value: 'Business Value', presentation: 'Presentation Agent' };
const agentAbbrs = { pm: 'PM', envisioning: 'EN', architect: 'SA', azure: 'AE', cost: 'CS', value: 'BV', presentation: 'PR' };

function userMsg(text, time) {
  return `<div class="message msg-user">
    <div class="bubble">${text}</div>
    <div class="msg-meta">${time}</div>
  </div>`;
}

function agentMsg(agentId, html, time) {
  const color = agentColors[agentId] || '#666';
  const name = agentNames[agentId] || agentId;
  const abbr = agentAbbrs[agentId] || '??';
  return `<div class="message msg-agent">
    <div class="agent-header">
      <div class="mini-avatar" style="background:${color};">${abbr}</div>
      <span class="name">${name}</span>
    </div>
    <div class="bubble">${html}</div>
    <div class="msg-meta">${time}</div>
  </div>`;
}

// Build the conversation
const conversation = [];

// ── Checkbox interaction ──
function toggleCheck(li) {
  const cb = li.querySelector('input[type="checkbox"]');
  cb.checked = !cb.checked;
  updateSelectedCount();
}

function updateSelectedCount() {
  const checked = document.querySelectorAll('#scenarioList input[type="checkbox"]:checked').length;
  document.getElementById('selectedCount').textContent = checked;
  document.getElementById('proceedBtn').disabled = checked === 0;
}

function handleProceed() {
  const btn = document.getElementById('proceedBtn');
  btn.textContent = '✓ Selections submitted';
  btn.disabled = true;
  btn.style.background = '#107C10';
}

function approveOutput(btn) {
  btn.textContent = '✓ Approved';
  btn.classList.add('clicked');
}

// ── Input handling ──
msgInput.addEventListener('input', () => {
  sendBtn.disabled = msgInput.value.trim().length === 0;
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const thinking = document.getElementById('thinkingIndicator');
  if (thinking) thinking.remove();

  chatThread.insertAdjacentHTML('beforeend', userMsg(text, time));
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.disabled = true;
  scrollToBottom();

  // Simulate agent response
  setTimeout(() => {
    chatThread.insertAdjacentHTML('beforeend', agentMsg('pm',
      `<p>Got it! I'll incorporate your feedback. Let me route this to the relevant agent…</p>
       <div class="thinking">
         <div class="thinking-dots"><span></span><span></span><span></span></div>
         <span>Processing…</span>
       </div>`, time));
    scrollToBottom();
  }, 1200);
}

function scrollToBottom() {
  chatThread.scrollTo({ top: chatThread.scrollHeight, behavior: 'smooth' });
}

// Scroll to bottom on load
setTimeout(scrollToBottom, 100);

// Render agents
renderAgents();

// Listen for checkbox changes directly
document.addEventListener('change', (e) => {
  if (e.target.matches('#scenarioList input[type="checkbox"]')) {
    updateSelectedCount();
  }
});
