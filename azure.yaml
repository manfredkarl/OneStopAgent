# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: onestopagent

infra:
  provider: bicep
  path: ./infra

services:
  api:
    project: ./src/python-api
    host: containerapp
    language: python
    docker:
      path: ./Dockerfile
  web:
    project: ./src/frontend
    host: containerapp
    language: ts
    docker:
      path: ./Dockerfile
      context: .

hooks:
  preprovision:
    windows:
      shell: pwsh
      run: |
        Write-Host "Provisioning OneStopAgent infrastructure..."
      continueOnError: true
  predeploy:
    windows:
      shell: pwsh
      run: |
        # Set the API URL for the frontend build
        $apiUrl = azd env get-value API_BASE_URL 2>$null
        if ($apiUrl) {
          Write-Host "Setting VITE_API_URL=$apiUrl"
          azd env set VITE_API_URL $apiUrl
        }
      continueOnError: false
