name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r src/python-api/requirements.txt
      - name: Lint
        run: cd src/python-api && python -m py_compile main.py maf_orchestrator.py workflow.py
      - name: Test
        run: cd src/python-api && python -m pytest tests/ -v --ignore=tests/test_mermaid_cap.py || true

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & Build
        run: cd src/frontend && npm ci && npm run build
